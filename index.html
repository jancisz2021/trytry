<title>Coffee Studio · 家庭咖啡食谱</title>

<style>
:root {

  --color-bg-secondary: #F5EFE8;

* { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
html { font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; -webkit-font-smoothing:antialiased; background:#F0EBE3; }

.app-container { max-width:430px; margin:0 auto; min-height:100vh; min-height:100dvh; background:var(--color-bg); position:relative; display:flex; flex-direction:column; }

.bottom-nav { position:sticky; bottom:0; z-index:100; background:rgba(255,255,255,0.88); backdrop-filter:blur(20px) saturate(1.2); -webkit-backdrop-filter:blur(20px) saturate(1.2); border-top:1px solid rgba(237,232,224,0.6); box-shadow:var(--shadow-nav); padding:6px 0 calc(env(safe-area-inset-bottom,6px)+6px); display:flex; justify-content:space-around; align-items:flex-start; flex-shrink:0; }

.nav-item:active .nav-icon { transform:scale(0.9); }

.hero-bar::before { content:''; position:absolute; top:-40%; right:-10%; width:60%; height:80%; background:radial-gradient(ellipse at center,rgba(212,165,116,0.1) 0%,transparent 70%); pointer-events:none; }
.hero-bar h1 { font-size:22px; font-weight:600; color:var(--color-text); position:relative; letter-spacing:-0.3px; }
.hero-bar p { font-size:13px; color:var(--color-text-secondary); margin-top:2px; position:relative; }
.settings-btn { position:absolute; top:var(--space-lg); right:var(--space-xl); z-index:5; width:36px; height:36px; border-radius:50%; border:none; background:rgba(255,255,255,0.7); backdrop-filter:blur(8px); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--color-text-secondary); box-shadow:0 1px 6px var(--color-shadow); transition:all 0.15s; }

.diary-header { padding:var(--space-xl) var(--space-xl) var(--space-md); position:relative; }

.diary-add-card { margin:0 var(--space-xl) var(--space-xl); padding:var(--space-xl); border-radius:var(--radius-xl); background:linear-gradient(135deg,var(--color-bg-secondary),#F0EBE3); border:1.5px dashed var(--color-primary-light); cursor:pointer; text-align:center; transition:all var(--duration-normal) var(--ease-out-quart); }

.diary-entry-actions { display:flex; gap:8px; padding:0 var(--space-lg) var(--space-lg); }

.diary-entry-variety { font-size:15px; font-weight:600; color:var(--color-text); }
.diary-entry-date { font-size:11px; color:var(--color-text-tertiary); white-space:nowrap; margin-left:8px; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease; }
.modal-box { background:var(--color-surface); border-radius:var(--radius-2xl); padding:var(--space-2xl); width:88%; max-width:380px; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-elevated); animation:modalIn 0.3s var(--ease-out-expo); }
@keyframes modalIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
.modal-box h2 { font-size:17px; font-weight:600; color:var(--color-text); margin-bottom:var(--space-xl); }

.modal-box .form-group input, .modal-box .form-group textarea, .modal-box .form-group select { width:100%; padding:10px 12px; border:1px solid var(--color-divider); border-radius:var(--radius-md); font-size:14px; color:var(--color-text); background:var(--color-bg); outline:none; font-family:inherit; transition:border-color 0.15s; }
.modal-box .form-group input:focus, .modal-box .form-group textarea:focus { border-color:var(--color-primary); }
.modal-box .form-group textarea { resize:vertical; min-height:80px; }
.modal-actions { display:flex; gap:var(--space-sm); margin-top:var(--space-2xl); }
.modal-actions .btn { flex:1; padding:10px; border-radius:var(--radius-md); border:none; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.15s; }
.modal-actions .btn-primary { background:var(--color-primary); color:#fff; }
.modal-actions .btn-primary:active { background:var(--color-primary-dark); }
.modal-actions .btn-cancel { background:var(--color-tag-bg); color:var(--color-text-secondary); }
.modal-actions .btn-cancel:active { background:var(--color-divider); }
.modal-image-upload { border:1.5px dashed var(--color-divider); border-radius:var(--radius-md); padding:16px; text-align:center; cursor:pointer; position:relative; }
.modal-image-upload input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
.modal-image-upload .preview { max-height:150px; border-radius:var(--radius-sm); margin-top:8px; display:block; max-width:100%; }
.modal-image-upload .hint { font-size:12px; color:var(--color-text-tertiary); }

.detail-diary-box { max-width:420px; }
.detail-diary-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-lg); }
.detail-diary-header h2 { font-size:18px; font-weight:600; color:var(--color-text); margin:0; }
.detail-diary-image-wrap { margin:0 calc(-1*var(--space-2xl)) var(--space-lg); }
.detail-diary-image { width:100%; max-height:50vh; object-fit:contain; display:block; background:var(--color-bg-secondary); border-radius:var(--radius-md); }
.detail-diary-notes { font-size:14px; color:var(--color-text-secondary); line-height:1.7; margin-bottom:var(--space-lg); padding:var(--space-lg); background:var(--color-bg); border-radius:var(--radius-md); }

.detail-hero { position:relative; width:100%; aspect-ratio:4/3; overflow:hidden; background:var(--color-bg-secondary); line-height:0; }
.detail-hero svg, .detail-hero img { width:100%; height:100%; display:block; }
.detail-hero img { object-fit:cover; }
.detail-hero-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(180deg,rgba(0,0,0,0.15) 0%,transparent 40%,transparent 60%,rgba(251,248,244,0.6) 85%,var(--color-bg) 100%); pointer-events:none; }
.back-btn { position:absolute; top:calc(env(safe-area-inset-top,12px)+12px); left:var(--space-lg); z-index:10; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.85); backdrop-filter:blur(10px); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--color-text); box-shadow:0 2px 12px rgba(0,0,0,0.08); transition:all 0.15s; }
.back-btn:active { transform:scale(0.9); }
.detail-back-link { display:inline-flex; align-items:center; gap:4px; padding:6px 12px; margin-bottom:var(--space-md); border:none; background:var(--color-tag-bg); border-radius:var(--radius-full); font-size:13px; color:var(--color-text-secondary); cursor:pointer; transition:all 0.15s; }
.detail-back-link:active { background:var(--color-divider); transform:scale(0.96); }
.detail-content { padding:var(--space-xl) var(--space-xl) var(--space-5xl); margin-top:-40px; position:relative; z-index:2; }
.detail-info-card { background:var(--color-surface); border-radius:var(--radius-xl); padding:var(--space-2xl); box-shadow:var(--shadow-elevated); margin-bottom:var(--space-3xl); }
.detail-name { font-size:20px; font-weight:600; color:var(--color-text); margin-bottom:2px; }
.detail-enname { font-size:13px; color:var(--color-text-tertiary); margin-bottom:var(--space-lg); }
.detail-flavor { font-size:13px; color:var(--color-text-secondary); line-height:1.7; padding:var(--space-lg) 0; border-top:1px solid var(--color-divider); border-bottom:1px solid var(--color-divider); margin-bottom:var(--space-lg); }
.detail-meta { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-md); }
.meta-item { text-align:center; }
.meta-item .label { font-size:11px; color:var(--color-text-tertiary); display:block; margin-bottom:4px; }
.meta-item .value { font-weight:500; font-size:13px; color:var(--color-text); }
.section-title { font-size:17px; font-weight:600; color:var(--color-text); margin-bottom:var(--space-lg); display:flex; align-items:center; gap:var(--space-sm); }
.ingredients-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:var(--space-sm); margin-bottom:var(--space-3xl); }
.ingredient-item { background:var(--color-bg); border-radius:var(--radius-lg); padding:var(--space-lg); display:flex; justify-content:space-between; align-items:center; }
.ingredient-name { font-size:13px; color:var(--color-text); }
.ingredient-amount { font-weight:500; font-size:13px; color:var(--color-primary); }
.steps-list { display:flex; flex-direction:column; gap:var(--space-lg); margin-bottom:var(--space-3xl); }
.step-card { background:var(--color-surface); border-radius:var(--radius-xl); overflow:hidden; box-shadow:var(--shadow-card); }
.step-body { padding:var(--space-lg); }
.step-header { display:flex; align-items:center; gap:var(--space-md); margin-bottom:var(--space-sm); }
.step-number { width:28px; height:28px; border-radius:50%; background:var(--color-primary); color:#fff; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.step-title { font-weight:500; font-size:15px; color:var(--color-text); }
.step-desc { font-size:13px; color:var(--color-text-secondary); line-height:1.7; margin-left:40px; }
.step-tip { margin-top:var(--space-sm); margin-left:40px; padding:var(--space-sm) var(--space-md); background:var(--color-accent-soft); border-radius:var(--radius-sm); font-size:12px; color:var(--color-primary-dark); display:flex; align-items:start; gap:6px; }
.tips-container { background:var(--color-bg-secondary); border-radius:var(--radius-xl); padding:var(--space-2xl); margin-bottom:var(--space-3xl); }
.tips-title { font-weight:500; font-size:15px; color:var(--color-text); margin-bottom:var(--space-lg); display:flex; align-items:center; gap:var(--space-sm); }
.tip-item { display:flex; align-items:start; gap:var(--space-md); padding:var(--space-sm) 0; }
.tip-item:not(:last-child) { border-bottom:1px solid rgba(237,232,224,0.6); margin-bottom:var(--space-sm); padding-bottom:var(--space-md); }
.tip-bullet { width:6px; height:6px; border-radius:50%; background:var(--color-accent); flex-shrink:0; margin-top:7px; }
.tip-text { font-size:13px; color:var(--color-text-secondary); line-height:1.6; }
.flavor-summary { background:linear-gradient(135deg,rgba(212,165,116,0.08),rgba(139,115,85,0.05)); border-radius:var(--radius-xl); padding:var(--space-2xl); margin-bottom:var(--space-3xl); border:1px solid rgba(212,165,116,0.12); }
.flavor-summary .label { font-size:11px; color:var(--color-accent); letter-spacing:1px; margin-bottom:var(--space-sm); }
.flavor-summary .text { font-size:13px; color:var(--color-text); line-height:1.8; font-style:italic; }
.empty-state { text-align:center; padding:60px var(--space-xl); color:var(--color-text-tertiary); }
.stagger-children > * { opacity:0; animation:fadeIn 0.4s var(--ease-out-quart) forwards; }
.stagger-children > *:nth-child(1) { animation-delay:0.03s; }
.stagger-children > *:nth-child(2) { animation-delay:0.06s; }
.stagger-children > *:nth-child(3) { animation-delay:0.09s; }
.stagger-children > *:nth-child(4) { animation-delay:0.12s; }
.stagger-children > *:nth-child(5) { animation-delay:0.15s; }
.stagger-children > *:nth-child(6) { animation-delay:0.18s; }

<script>

const DIARY_KEY = 'coffee_diary_entries';
function getDiaryEntries() { try { const d=localStorage.getItem(DIARY_KEY); return d?JSON.parse(d):[]; } catch(e){return [];} }
function saveDiaryEntry(e) { const entries=getDiaryEntries(); entries.unshift(e); localStorage.setItem(DIARY_KEY,JSON.stringify(entries)); }
function deleteDiaryEntry(id) { localStorage.setItem(DIARY_KEY,JSON.stringify(getDiaryEntries().filter(e=>e.id!==id))); }
function updateDiaryEntry(id,data) { const entries=getDiaryEntries(); const idx=entries.findIndex(e=>e.id===id); if(idx>-1){entries[idx]={...entries[idx],...data};localStorage.setItem(DIARY_KEY,JSON.stringify(entries));} }

function renderPage(tab){
  if(tab==='diary') return renderDiary();
  const data=getCoffeeData().filter(c=>c.category===tab);
  const words={'黑咖':'经典醇厚，唤醒每一天','奶咖':'丝滑温暖，治愈时光','网红特调':'居家复刻，爆款同款','创意特调':'打破常规，味觉冒险'};
  return `<div class="page active"><div class="hero-bar"><h1>${tab}</h1><p>${words[tab]||'精选咖啡食谱'}</p></div>
    <div class="card-grid stagger-children">${data.map(c=>createCoffeeCard(c)).join('')||'<div class="empty-state">暂无食谱</div>'}</div></div>`;
}

function createCoffeeCard(coffee){
  const t=coffee.tags.map(t=>`<span class="card-tag">${t}</span>`).join('');
  const img=coffee.customImage?`<img src="${coffee.customImage}" alt="${coffee.name}" loading="lazy">`:Illus.mainSVG(coffee);
  return `<div class="coffee-card" data-id="${coffee.id}" role="button" tabindex="0">
    <div class="card-image-wrap">${img}<div class="card-tags">${t}</div></div>
    <div class="card-body"><div class="card-name">${coffee.name}</div><div class="card-enname">${coffee.enName}</div>
    <div class="card-flavor">${coffee.flavor}</div><div class="card-footer"><span>${coffee.difficulty}</span><span>${coffee.time}</span></div></div></div>`;
}

function esc(s){if(typeof s!=='string')return s||'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function switchTab(tab){
  if(state.isTransitioning||tab===state.activeTab)return;
  state.isTransitioning=true; state.activeTab=tab;
  $$('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  const c=document.getElementById('pageContent');
  c.style.opacity='0'; c.style.transform='translateY(8px)'; c.style.transition='opacity 0.2s ease, transform 0.2s ease';
  setTimeout(()=>{c.innerHTML=renderPage(tab);c.style.opacity='1';c.style.transform='translateY(0)';bindPageEvents(tab);state.isTransitioning=false;document.getElementById('contentArea')?.scrollTo({top:0,behavior:'instant'});},180);
}

function goToDetail(id){
  if(state.isTransitioning)return; state.isTransitioning=true;
  $('.page.active')?.classList.add('page-out');
  setTimeout(()=>{
    const coffee=getCoffeeData().find(c=>c.id===id);
    if(!coffee){state.isTransitioning=false;return;}
    state.currentCoffee=coffee;
    document.getElementById('bottomNav').style.display='none';
    const c=document.getElementById('pageContent'); c.innerHTML=renderDetailPage(coffee);
    document.getElementById('detailBackBtn')?.addEventListener('click',goBack);
    document.getElementById('detailBackLink')?.addEventListener('click',goBack);
    state.isTransitioning=false; document.getElementById('contentArea')?.scrollTo({top:0,behavior:'instant'});
  },250);
}

function goBack(){
  document.getElementById('bottomNav').style.display='flex';
  const c=document.getElementById('pageContent'); c.innerHTML=renderPage(state.activeTab);
  bindPageEvents(state.activeTab);
  document.getElementById('contentArea')?.scrollTo({top:0,behavior:'instant'});
}

// ============================================================
// EVENTS
// ============================================================
function bindPageEvents(tab){
  if(tab==='diary'){bindDiaryEvents();return;}
  $$('.coffee-card').forEach(el=>el.addEventListener('click',()=>goToDetail(parseInt(el.dataset.id))));
}

function bindDiaryEvents(){
  $('#addDiaryEntry')?.addEventListener('click',()=>showDiaryModal());
  $$('.diary-entry-edit').forEach(btn=>{
    btn.addEventListener('click',(e)=>{e.stopPropagation();const id=btn.dataset.id;const entry=getDiaryEntries().find(ev=>ev.id===id);if(entry)showDiaryModal(entry);});
  });
  $$('.diary-entry-delete').forEach(btn=>{
    btn.addEventListener('click',(e)=>{e.stopPropagation();
      if(confirm('删除这条记录？')){deleteDiaryEntry(btn.dataset.id);reloadTab();}
    });
  });
  $$('.diary-entry-clickable').forEach(el=>{
    el.addEventListener('click',(e)=>{const id=el.closest('.diary-entry')?.dataset.id;if(id)showDiaryDetail(id);});
  });
}

function reloadTab(){document.getElementById('pageContent').innerHTML=renderPage(state.activeTab);bindPageEvents(state.activeTab);}

// ============================================================
// DIARY MODAL
// ============================================================
let diaryImageData=null;
let diaryEditId=null;

function showDiaryModal(entry){
  state.showModal=true;
  diaryEditId=entry?.id||null;
  diaryImageData=entry?.image||null;
  const today=new Date().toISOString().split('T')[0];
  const varietyOptions=getCoffeeData().map(c=>`<option value="${c.name}">`).join('');
  const isEdit=!!entry;
  $('#pageContent').insertAdjacentHTML('beforeend',
    `<div class="modal-overlay" id="modalOverlay"><div class="modal-box"><h2>${isEdit?'✏️ 编辑记录':'📝 记录咖啡'}</h2>
      <div class="form-group"><label>咖啡品种</label><input type="text" id="diaryVariety" placeholder="e.g. 生椰拿铁、手冲瑰夏..." list="vList" value="${esc(entry?.variety||'')}"><datalist id="vList">${varietyOptions}</datalist></div>
      <div class="form-group"><label>日期</label><input type="date" id="diaryDate" value="${entry?.date||today}"></div>
      <div class="form-group"><label>照片</label><div class="modal-image-upload" id="diaryImageUpload" style="cursor:pointer;"><input type="file" accept="image/*" id="diaryImageInput"><div class="hint" id="diaryImageHint">${entry?.image?'✅ 已选择照片':'点击上传你的咖啡照片'}</div></div><img id="diaryImagePreview" class="preview" style="${entry?.image?'display:block;':'display:none;'}" src="${entry?.image||''}"></div>
      <div class="form-group"><label>备注</label><textarea id="diaryNotes" placeholder="今天做咖啡的感受、心得..." rows="3">${esc(entry?.notes||'')}</textarea></div>
      <div class="modal-actions"><button class="btn btn-cancel" id="modalCancel">取消</button><button class="btn btn-primary" id="modalSave">${isEdit?'保存修改':'保存记录'}</button></div></div></div>`);

  $('#modalCancel').addEventListener('click',closeModal);
  $('#modalOverlay').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeModal();});
  $('#diaryImageInput').addEventListener('change',(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=(ev)=>{const img=new Image();img.onload=()=>{
      let w=img.width,h=img.height,m=800;if(w>m){h=h*m/w;w=m;}if(h>m){w=w*m/h;h=m;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      diaryImageData=c.toDataURL('image/jpeg',0.8);
      const pv=$('#diaryImagePreview');if(pv){pv.src=diaryImageData;pv.style.display='block';}
      const ht=$('#diaryImageHint');if(ht)ht.textContent='✅ 已选择照片';
    };img.src=ev.target.result;};
    r.readAsDataURL(f);
  });
  $('#modalSave').addEventListener('click',()=>{
    const v=$('#diaryVariety')?.value.trim()||'未知品种';
    const d=$('#diaryDate')?.value||new Date().toISOString().split('T')[0];
    const n=$('#diaryNotes')?.value.trim()||'';
    if(isEdit&&diaryEditId){
      updateDiaryEntry(diaryEditId,{date:d,variety:v,notes:n,image:diaryImageData});
    }else{
      saveDiaryEntry({id:Date.now().toString(),date:d,variety:v,notes:n,image:diaryImageData||null,createdAt:Date.now()});
    }
    closeModal();reloadTab();
  });
}

function showDiaryDetail(id){
  const entry=getDiaryEntries().find(e=>e.id===id);
  if(!entry)return;
  const imgHtml=entry.image?`<div class="detail-diary-image-wrap"><img src="${entry.image}" alt="" class="detail-diary-image"></div>`:'';
  $('#pageContent').insertAdjacentHTML('beforeend',
    `<div class="modal-overlay" id="modalOverlay"><div class="modal-box detail-diary-box">
      <div class="detail-diary-header"><h2>${esc(entry.variety||'自制冷萃')}</h2><span class="diary-entry-date">${entry.date||''}</span></div>
      ${imgHtml}
      ${entry.notes?`<div class="detail-diary-notes">${esc(entry.notes)}</div>`:''}
      <div class="modal-actions"><button class="btn btn-cancel" id="detailDiaryClose">关闭</button><button class="btn btn-primary" id="detailDiaryEdit">编辑</button></div></div></div>`);
  $('#modalOverlay').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeModal();});
  $('#detailDiaryClose').addEventListener('click',closeModal);
  $('#detailDiaryEdit').addEventListener('click',()=>{closeModal();showDiaryModal(entry);});
}

function closeModal(){state.showModal=false;diaryEditId=null;$('#modalOverlay')?.remove();}

// ============================================================
// DATA SOURCE BANNER
// ============================================================
function showBanner(){
  if(!window.__coffeeData)return;
  const b=document.createElement('div');
  b.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:99;background:#8B7355;color:#fff;font-size:11px;padding:6px 14px;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,0.15);opacity:0.85;pointer-events:none;';
  b.textContent='☕ 正在使用管理后台数据';
  document.body.appendChild(b);
  setTimeout(()=>{b.style.transition='opacity 0.5s';b.style.opacity='0';setTimeout(()=>b.remove(),500);},4000);
}

// ============================================================
// INIT
// ============================================================
function init(){
  app.innerHTML=renderApp();
  document.getElementById('pageContent').innerHTML=renderPage(state.activeTab);
  $$('.nav-item').forEach(el=>el.addEventListener('click',()=>switchTab(el.dataset.tab)));
  bindPageEvents(state.activeTab);
  app.addEventListener('click',(e)=>{const btn=e.target.closest('#settingsBtn');if(btn)window.location.href='coffee-admin.html';});
  if(window.__coffeeData)showBanner();
  document.body.style.opacity='0';document.body.style.transition='opacity 0.4s ease';
  requestAnimationFrame(()=>{document.body.style.opacity='1';});
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
