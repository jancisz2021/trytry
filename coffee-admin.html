<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Studio · 后台管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #FBF8F4;
  --bg2: #F5EFE8;
  --surface: #FFFFFF;
  --primary: #8B7355;
  --primary-l: #C4A882;
  --text: #3D3229;
  --text2: #8C7C6E;
  --text3: #B5A89C;
  --border: #EDE8E0;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(139,115,85,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
input, textarea, select { font-family: inherit; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.content { flex: 1; display: flex; overflow: hidden; }
.editor-area { flex: 1; overflow-y: auto; padding: 24px; }
.preview-area { width: 400px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 24px; flex-shrink: 0; }

/* Sidebar */
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
.sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
.coffee-list { flex: 1; overflow-y: auto; padding: 8px; }
.coffee-item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; margin-bottom: 2px; }
.coffee-item:hover { background: var(--bg); }
.coffee-item.active { background: var(--bg2); }
.coffee-item .badge { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.coffee-item .info { flex: 1; min-width: 0; }
.coffee-item .name { font-size: 13px; font-weight: 500; }
.coffee-item .sub { font-size: 11px; color: var(--text2); }
.coffee-item .del-btn { opacity: 0; transition: opacity 0.15s; width: 24px; height: 24px; border: none; background: none; cursor: pointer; border-radius: 6px; color: #999; font-size: 14px; }
.coffee-item:hover .del-btn { opacity: 1; }
.coffee-item .del-btn:hover { background: #fee; color: #e44; }

/* Forms */
.form-section { margin-bottom: 28px; }
.form-section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 60px; }

/* Dynamic list */
.dyn-list { display: flex; flex-direction: column; gap: 6px; }
.dyn-item { display: flex; gap: 8px; align-items: center; }
.dyn-item input { flex: 1; }
.dyn-item .rm-btn { width: 28px; height: 28px; border: none; background: #f5f5f5; border-radius: 6px; cursor: pointer; color: #999; flex-shrink: 0; }
.dyn-item .rm-btn:hover { background: #fee; color: #e44; }
.add-btn { padding: 6px 14px; border: 1px dashed var(--border); background: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--text2); margin-top: 6px; transition: all 0.15s; }
.add-btn:hover { border-color: var(--primary); color: var(--primary); }

/* Preview Card */
.preview-card { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 16px; background: var(--surface); }
.preview-card .card-img { line-height: 0; }
.preview-card .card-img svg { width: 100%; height: auto; display: block; }
.preview-card .card-body { padding: 12px; }
.preview-card .card-body .name { font-size: 14px; font-weight: 600; }
.preview-card .card-body .sub { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.preview-card .card-body .flavor { font-size: 12px; color: var(--text2); }
.preview-card .card-body .meta { display: flex; gap: 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); }

/* Buttons */
.btn { padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #7A6548; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: #fee; color: #c44; }
.btn-danger:hover { background: #fdd; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Highlight */
.empty-hint { text-align: center; padding: 60px 40px; color: var(--text3); font-size: 14px; }
.empty-hint .icon { font-size: 40px; margin-bottom: 12px; }

/* Toast */
.toast { position: fixed; bottom: 30px; right: 30px; background: var(--text); color: #fff; padding: 12px 24px; border-radius: var(--radius-sm); font-size: 13px; z-index: 999; opacity: 0; transform: translateY(10px); transition: all 0.3s; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Image upload */
.image-upload-area { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 24px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
.image-upload-area:hover { border-color: var(--primary-l); background: rgba(196,168,130,0.04); }
.image-upload-area.dragover { border-color: var(--primary); background: rgba(139,115,85,0.06); }
.image-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.image-upload-area .icon { font-size: 32px; margin-bottom: 8px; }
.image-upload-area .text { font-size: 13px; color: var(--text2); }
.image-upload-area .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.image-preview-wrap { position: relative; border-radius: var(--radius-sm); overflow: hidden; margin-top: 8px; }
.image-preview-wrap img { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-sm); }
.image-preview-wrap .remove-img-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(0,0,0,0.5); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.image-preview-wrap .remove-img-btn:hover { background: rgba(0,0,0,0.7); }

/* Tags input */
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.tag-item { padding: 3px 8px; background: var(--bg2); border-radius: 6px; font-size: 11px; display: flex; align-items: center; gap: 4px; }
.tag-item .x { cursor: pointer; color: var(--text3); }
.tag-input-wrap { display: flex; gap: 4px; }
.tag-input-wrap input { flex: 1; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; }
.tag-input-wrap input:focus { border-color: var(--primary); }

/* Scrollbar */
.editor-area::-webkit-scrollbar, .preview-area::-webkit-scrollbar, .coffee-list::-webkit-scrollbar { width: 4px; }
.editor-area::-webkit-scrollbar-thumb, .preview-area::-webkit-scrollbar-thumb, .coffee-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal-box { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-box h2 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <h1>☕ Coffee Studio</h1>
          <p>食谱后台管理</p>
        </div>
        <span id="coffeeCount" style="font-size:12px;color:var(--text3);">0</span>
      </div>
    </div>
    <div style="padding:8px 16px;display:flex;gap:6px;border-bottom:1px solid var(--border);">
      <button class="btn btn-primary btn-sm" id="addBtn" style="flex:1;">+ 新增咖啡</button>
      <button class="btn btn-outline btn-sm" id="exportBtn">导出</button>
      <button class="btn btn-outline btn-sm" id="importBtn">导入</button>
    </div>
    <div class="coffee-list" id="coffeeList"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;flex-direction:column;gap:4px;">
      <div style="display:flex;justify-content:space-between;">
        <span id="saveStatus">已保存</span>
        <span>v1.0</span>
      </div>
      <div style="font-size:10px;background:var(--bg);padding:6px 8px;border-radius:6px;color:var(--text2);">
        💡 主应用如在同一浏览器打开，将自动同步管理后台数据（刷新即生效）。
        也可点击顶部「⚡ 生成主应用」生成完整 HTML 文件替换。
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="editorTitle" style="font-size:15px;font-weight:600;">选择一杯咖啡开始编辑</span>
        <span id="editorId" style="font-size:11px;color:var(--text3);"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:11px;color:var(--text3);display:none;" id="autoHint">💡 主应用自动同步中</span>
        <button class="btn btn-outline btn-sm" id="generateAppBtn" title="生成完整的 coffee-app.html 文件">⚡ 生成主应用</button>
        <button class="btn btn-outline btn-sm" id="exportDataBtn" title="导出为可替换的 JavaScript 代码">导出 data.js</button>
        <button class="btn btn-primary btn-sm" id="saveBtn">💾 保存</button>
      </div>
    </div>

    <div class="content">
      <!-- Editor -->
      <div class="editor-area" id="editorArea">
        <div class="empty-hint">
          <div class="icon">☕</div>
          <p>左侧列表选择咖啡，或点击「新增咖啡」</p>
          <p style="font-size:12px;margin-top:8px;color:var(--text3);">编辑后自动保存到浏览器，导出可替换主应用数据</p>
        </div>
      </div>

      <!-- Preview -->
      <div class="preview-area" id="previewArea">
        <div style="font-size:13px;font-weight:600;margin-bottom:16px;">👁 预览</div>
        <div id="previewContent">
          <div style="text-align:center;padding:40px 0;color:var(--text3);font-size:12px;">选择咖啡后显示预览</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="modalContainer" style="display:none;"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".json,.js" style="display:none;">

  { id:2, name:'冰美式', enName:'Iced Americano', category:'黑咖', flavor:'清爽冰冽，焦香回甘，夏日必备续命水', description:'冰美式是夏天的灵魂饮品。浓缩咖啡与冰水的碰撞，保留了咖啡香气的同時帶來冰爽口感。', difficulty:'简单', time:'3分钟', calories:'≈12kcal', scene:'夏日解暑 · 午后提神', tags:['冷','冰'], cupType:'tall', palette:{ bg:'#EEF2F0', bg2:'#DCE8E4', cup:'#E8F0EE', liq:'#4A3228', ac:'#A8C4BC', ac2:'#C8DDD8' }, decor:['ice'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'冰水',amount:'200ml'},{name:'冰块',amount:'8-10颗'}], steps:[{title:'准备冰块',desc:'在玻璃杯中装满冰块，约8-10颗，最好使用大冰块融化更慢。',tip:'透明大冰块不仅好看，而且融化速度慢，不会稀释咖啡'},{title:'萃取浓缩',desc:'取18g咖啡粉萃取30ml浓缩咖啡，油脂金黄丰富。',tip:'冰美式的浓缩可以稍微萃久一点，增加醇厚度'},{title:'混合',desc:'将冰水沿杯壁缓缓倒入冰块中，再将浓缩咖啡缓慢淋在冰块上。',tip:'最后倒入浓缩可以让咖啡油脂漂浮在表面，视觉更好'},{title:'搅拌享用',desc:'轻轻搅拌均匀，让咖啡与冰水充分融合，即可享受冰爽咖啡。',tip:'使用玻璃杯装冰美式，视觉效果和口感都会更好'}], tips:['浓缩咖啡直接淋在冰块上可以更好地锁住香气','建议使用大冰球，融化慢且美观','搭配一片柠檬或薄荷叶，风味层次更丰富'], flavorSummary:'冰爽透彻的味觉体验，浓缩咖啡的醇厚被冰水温柔稀释，留下焦糖般的回甘。每一口都是酷热天气里的救赎，简单却让人上瘾。' },
  { id:3, name:'冷萃咖啡', enName:'Cold Brew', category:'黑咖', flavor:'丝滑醇厚，低酸微甜，冷泡12小时的美味', description:'冷萃咖啡用时间换风味。冷水慢速萃取12小时以上，带来丝滑顺口、几乎无酸涩的独特口感。', difficulty:'中等', time:'12-24小时', calories:'≈10kcal', scene:'居家储备 · 周末准备', tags:['冷','慢萃'], cupType:'mason', palette:{ bg:'#F3EFEA', bg2:'#E8E0D6', cup:'#D4D0C8', liq:'#5C4434', ac:'#B8A890', ac2:'#D0C8B8' }, decor:['ice2'], ingredients:[{name:'咖啡豆（粗磨）',amount:'50g'},{name:'冷水',amount:'600ml'},{name:'冰块',amount:'适量'}], steps:[{title:'粗磨咖啡豆',desc:'将50g咖啡豆研磨至粗砂糖大小，太细会导致过度萃取口感浑浊。',tip:'冷萃的研磨度要比手冲粗很多，接近法压壶的粗细'},{title:'浸泡',desc:'将咖啡粉放入冷萃壶或密封容器，加入600ml冷水，轻轻搅拌使所有粉都浸湿。',tip:'先加少量水搅拌成糊状，再倒入剩余水，萃取更均匀'},{title:'冷藏萃取',desc:'盖紧盖子，放入冰箱冷藏12-24小时。时间越长风味越浓郁。',tip:'12小时口感清爽，18小时醇厚，24小时浓郁强烈'},{title:'过滤享用',desc:'用滤纸或细网筛过滤咖啡渣，得到清澈的冷萃原液。加冰或直接饮用。',tip:'冷萃原液可以冷藏保存3-5天，随时享用'}], tips:['冷萃的粉水比建议1:12，口感较为平衡','使用中深烘焙的咖啡豆，巧克力坚果调性与冷萃是绝配','过滤后的冷萃原液加牛奶或燕麦奶，就是一杯完美的冷萃拿铁'], flavorSummary:'如同丝绒般柔滑的口感，低温慢萃去除了尖锐的酸涩，留下巧克力和坚果的圆润风味。微甜的回甘在舌尖久久不散，是炎炎夏日里最治愈的冰咖啡。' },
  { id:4, name:'气泡美式', enName:'Sparkling Americano', category:'黑咖', flavor:'气泡跳跃，清爽刺激，夏日快乐水', description:'当浓缩咖啡遇见气泡水，绵密的泡沫与跳跃的气泡完美融合，带来全新的咖啡体验。', difficulty:'简单', time:'3分钟', calories:'≈15kcal', scene:'夏日特调 · 下午茶时光', tags:['冷','气泡'], cupType:'tall', palette:{ bg:'#F0F4F4', bg2:'#E0E8E8', cup:'#E0E8E8', liq:'#6B4030', ac:'#90B8B8', ac2:'#B8D8D8' }, decor:['bubbles'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'气泡水',amount:'200ml'},{name:'冰块',amount:'8-10颗'},{name:'柠檬片',amount:'1片（可选）'}], steps:[{title:'准备冰杯',desc:'在玻璃杯中装满冰块，放入一片柠檬片增香。',tip:'杯子最好提前冰镇，气泡效果更持久'},{title:'萃取浓缩',desc:'萃取一份浓郁的浓缩咖啡，约30ml。',tip:'气泡美式适合用深烘焙豆，风味更强烈不被气泡水稀释'},{title:'倒入气泡水',desc:'将冰镇气泡水沿杯壁缓缓倒入约八分满。',tip:'气泡水要冰镇，常温气泡水会让咖啡快速变淡'},{title:'淋入浓缩',desc:'将浓缩咖啡沿杯壁缓慢淋入，形成漂亮的分层效果。',tip:'不要搅拌，先拍照再搅拌——分层的视觉效果非常棒'}], tips:['推荐使用泰象或巴黎水等强气泡水，气泡感更足','加入少量糖浆或蜂蜜，就是一杯咖啡气泡鸡尾酒','用高脚杯或威士忌杯装更显格调'], flavorSummary:'入口是气泡在舌尖欢快跳跃的刺激感，随后咖啡的醇厚慢慢浮现。气泡水放大了咖啡的香气层次，让每一口都充满惊喜。夏日炎炎，没有比这更畅快的咖啡了。' },
  { id:5, name:'原味拿铁', enName:'Caffè Latte', category:'奶咖', flavor:'奶泡绵密，咖啡温润，入门必选的经典奶咖', description:'拿铁是咖啡与牛奶的完美二重奏。一份浓缩搭配蒸汽加热的绵密牛奶，口感如丝绒般顺滑。', difficulty:'中等', time:'5分钟', calories:'≈150kcal', scene:'早餐搭配 · 下午茶时光', tags:['热','经典'], cupType:'hot', palette:{ bg:'#F8F0E8', bg2:'#EDE0D4', cup:'#FFF', liq:'#C4A882', ac:'#D4A574', ac2:'#E8D0B8' }, decor:['heart'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'全脂牛奶',amount:'200ml'},{name:'咖啡豆',amount:'18g'}], steps:[{title:'萃取浓缩',desc:'取18g咖啡粉萃取30ml浓缩咖啡，油脂金黄丰富。',tip:'拿铁的浓缩需要油脂丰富，建议选用中深烘焙豆'},{title:'打发奶泡',desc:'将冰牛奶倒入拉花缸，用蒸汽棒打发至65°C左右，形成绵密奶泡。',tip:'牛奶从冰箱取出后立即打发效果最好，奶泡更绵密'},{title:'融合',desc:'将打好的奶泡轻轻旋转倒入浓缩咖啡中，用勺子控制流速。',tip:'先让牛奶沉底融合，最后将奶泡推至表面'},{title:'拉花享用',desc:'手腕轻轻晃动绘制图案，一杯经典的拿铁就完成了。',tip:'新手可以先从简单的圆点或爱心开始练习拉花'}], tips:['全脂牛奶的脂肪含量在3.5%以上，打发的奶泡最绵密稳定','理想的奶泡温度是55-65°C，过高会破坏蛋白质结构','拿铁的灵魂在于奶泡——绵密、细腻、有光泽的奶泡是成功的关键'], flavorSummary:'温润如丝的拿铁，浓缩的醇厚被牛奶温柔包裹，入口是奶泡如云朵般的绵密触感。咖啡的焦香与牛奶的甜感完美融合，温暖整个清晨。这是一杯让人嘴角上扬的咖啡。' },
  { id:6, name:'卡布奇诺', enName:'Cappuccino', category:'奶咖', flavor:'奶泡厚实，咖啡浓郁，意式经典早餐搭档', description:'卡布奇诺是意式咖啡的经典代表。浓缩、蒸汽牛奶、厚实奶泡三层分明，口感丰富有层次。', difficulty:'中等', time:'5分钟', calories:'≈140kcal', scene:'意式早餐 · 悠闲午后', tags:['热','经典'], cupType:'hot', palette:{ bg:'#F5EDE6', bg2:'#E8DDD0', cup:'#FFF', liq:'#C4A87A', ac:'#8B7355', ac2:'#C8B898' }, decor:['foam'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'全脂牛奶',amount:'150ml'},{name:'可可粉',amount:'少许（可选）'}], steps:[{title:'萃取浓缩',desc:'萃取30ml浓郁的浓缩咖啡，倒入温热的陶瓷杯中。',tip:'卡布奇诺的杯子建议提前温热，保温效果更好'},{title:'打发厚奶泡',desc:'将150ml牛奶打发至绵密厚实，奶泡量约为牛奶的1.5倍。',tip:'卡布奇诺的奶泡要比拿铁更厚实、更干，打发时间稍长'},{title:'组合',desc:'将打发好的奶泡用勺子舀到浓缩咖啡上，先融合再堆叠。',tip:'先倒入少量牛奶融合，再将厚奶泡堆在表面形成小山丘'},{title:'装饰',desc:'在奶泡表面筛上一层可可粉或肉桂粉，增添香气。',tip:'用模具筛粉可以做出漂亮图案，让咖啡更有仪式感'}], tips:['卡布奇诺的经典配比是1:1:1——浓缩:蒸汽牛奶:奶泡','使用陶瓷杯比玻璃杯保温效果更好，适合热饮','撒可可粉前先轻拍奶泡表面使其平整，效果更佳'], flavorSummary:'经典意式风味，第一口是厚实奶泡的绵密触感，接着是浓缩咖啡的强烈香气，最后是牛奶的甘甜收尾。三层口感层次分明又和谐统一，如同在舌尖演奏一首咖啡交响曲。' },
  { id:7, name:'澳白', enName:'Flat White', category:'奶咖', flavor:'咖啡浓郁，奶泡细腻，澳洲精品咖啡精髓', description:'澳白源自澳大利亚，比拿铁更浓郁的咖啡风味，配合天鹅绒般丝滑的微泡奶沫。', difficulty:'中等', time:'5分钟', calories:'≈120kcal', scene:'精品咖啡 · 工作提神', tags:['热','精品'], cupType:'hot', palette:{ bg:'#FAF5F0', bg2:'#F0E8E0', cup:'#FFF', liq:'#B8A088', ac:'#D4C4B0', ac2:'#E8DDD0' }, decor:['dot'], ingredients:[{name:'浓缩咖啡（双份）',amount:'45ml'},{name:'全脂牛奶',amount:'180ml'},{name:'咖啡豆',amount:'20g'}], steps:[{title:'双份萃取',desc:'用20g咖啡粉萃取45ml双份浓缩，咖啡量比拿铁更多。',tip:'澳白的咖啡基底比拿铁更强，建议用中深烘焙豆'},{title:'薄奶泡',desc:'将牛奶打发成薄而细腻的奶泡，表面如丝绸般光滑。',tip:'澳白的奶泡是微泡——比拿铁更薄，比普通牛奶稍稠'},{title:'融合拉花',desc:'将奶泡从中心点注入，融合后表面呈现纯白色。',tip:'澳白的拉花技巧是低流量缓慢注入，确保咖啡与奶完美融合'},{title:'出品',desc:'表面应该是平坦的纯白色，没有任何大气泡，点缀简约拉花。',tip:'澳白的标志性特征是表面棕榈树图案或简单的白点'}], tips:['澳白和拿铁最大的区别：咖啡占比更高，奶泡更薄更细腻','澳白通常使用Ristretto萃取（短萃），咖啡更浓郁香甜','盛装澳白建议使用160ml左右的陶瓷杯，杯型小巧精致'], flavorSummary:'澳白是奶咖中的优雅派。双份浓缩带来强烈的咖啡冲击力，而天鹅绒般的奶泡将口感柔化到极致。每一口都能品尝到咖啡豆本身的风味特质，是真正为咖啡爱好者打造的奶咖。' },
  { id:8, name:'摩卡咖啡', enName:'Caffè Mocha', category:'奶咖', flavor:'巧克力与咖啡完美交融，甜蜜治愈的温暖饮品', description:'摩卡咖啡将巧克力的浓郁与咖啡的醇厚巧妙结合，加上绵密奶泡，是一杯充满幸福感的甜蜜饮品。', difficulty:'中等', time:'6分钟', calories:'≈280kcal', scene:'甜点时光 · 冬日暖饮', tags:['热','甜'], cupType:'hot', palette:{ bg:'#F0E8E0', bg2:'#E0D0C0', cup:'#FFF', liq:'#5C3D2E', ac:'#8B5A3C', ac2:'#B88060' }, decor:['drizzle'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'全脂牛奶',amount:'200ml'},{name:'黑巧克力酱',amount:'30g'},{name:'鲜奶油',amount:'适量'},{name:'可可粉',amount:'少许'}], steps:[{title:'制作巧克力底',desc:'在杯底挤入30g黑巧克力酱，可用微波炉稍微加热使其顺滑。',tip:'使用70%以上的黑巧克力酱，甜而不腻'},{title:'萃取浓缩',desc:'萃取30ml浓缩咖啡，直接淋在巧克力酱上，搅拌均匀。',tip:'让热咖啡与巧克力充分融合，基底就完成了'},{title:'打发牛奶',desc:'将200ml牛奶打发至65°C的绵密奶泡。',tip:'摩卡的牛奶可以比拿铁稍薄一些，更容易与巧克力融合'},{title:'组装装饰',desc:'倒入牛奶，挤上鲜奶油，筛可可粉装饰，一杯摩卡就完成了。',tip:'鲜奶油在最后挤，用裱花袋挤出漂亮的花纹'}], tips:['用真正黑巧克力融化代替巧克力酱，风味更高级自然','控制甜度——黑巧克力的苦甜平衡能让摩卡更有层次','冬天在摩卡上放两根肉桂棒作为搅拌棒，既是装饰又能增香'], flavorSummary:'摩卡是咖啡甜品界的完美杰作。入口是巧克力的丝滑浓郁，随后咖啡的醇厚香气缓缓渗透，奶油的轻盈在舌尖融化。这不仅仅是一杯咖啡，更像是一份精致的甜点，给你满满的幸福感。' },
  { id:9, name:'焦糖玛奇朵', enName:'Caramel Macchiato', category:'奶咖', flavor:'焦糖香甜，奶泡绵密，星巴克人气经典复刻', description:'焦糖玛奇朵是层次分明的甜蜜诱惑。香草糖浆、蒸汽牛奶、浓缩咖啡和焦糖酱的完美层叠。', difficulty:'中等', time:'6分钟', calories:'≈250kcal', scene:'闺蜜下午茶 · 甜蜜时光', tags:['热','甜'], cupType:'hot', palette:{ bg:'#F8F0E8', bg2:'#F0E0D0', cup:'#FFF', liq:'#C4A882', ac:'#D4A050', ac2:'#E8C080' }, decor:['cross'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'全脂牛奶',amount:'200ml'},{name:'香草糖浆',amount:'15ml'},{name:'焦糖酱',amount:'适量'}], steps:[{title:'杯底加糖浆',desc:'在透明玻璃杯底倒入15ml香草糖浆。',tip:'用透明玻璃杯才能展示玛奇朵漂亮的层次感'},{title:'倒入牛奶',desc:'将牛奶打发至绵密后，缓缓倒入杯中。',tip:'牛奶温度控制在65°C左右，奶泡不要太厚'},{title:'萃取浓缩',desc:'将30ml浓缩咖啡从中间缓慢倒入，咖啡会浮在牛奶上方。',tip:'沿中心缓慢倒入，咖啡会自然停留在牛奶上层形成分层'},{title:'淋焦糖酱',desc:'在奶泡表面交叉挤上焦糖酱，形成网格装饰。',tip:'焦糖酱在咖啡表面交叉画出格子，是玛奇朵的标志性造型'}], tips:['焦糖玛奇朵的精髓在于层次感——喝的时候从下到上味道逐渐变化','自制焦糖酱很简单：白糖加水熬至琥珀色，加入淡奶油搅匀即可','冰焦糖玛奇朵同样美味：冰块+牛奶+浓缩+焦糖酱'], flavorSummary:'星巴克人气单品的居家复刻。入口是焦糖酱的甜蜜，然后是绵密奶泡的轻柔触感，最后浓缩咖啡的醇厚在口中绽放。从甜到苦的层次过渡让人欲罢不能，每一口都有不同的味觉体验。' },
  { id:10, name:'Dirty脏咖', enName:'Dirty Coffee', category:'奶咖', flavor:'冰火两重天，浓咖啡与冰牛奶的戏剧碰撞', description:'Dirty是最近风靡的咖啡新宠。将浓缩咖啡直接萃取到冰牛奶上，咖啡油脂在牛奶表面形成如脏污般的纹路。', difficulty:'简单', time:'3分钟', calories:'≈130kcal', scene:'打卡必备 · 咖啡新宠', tags:['冷','网红'], cupType:'low', palette:{ bg:'#F0ECEA', bg2:'#E8E0D8', cup:'#F0E8E4', liq:'#5C3D2E', ac:'#D4C4B8', ac2:'#E8DDD4' }, decor:['layer'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'冰牛奶',amount:'200ml'},{name:'冰块',amount:'3-4颗'}], steps:[{title:'冰镇牛奶',desc:'在玻璃杯中加入冰牛奶至七分满，放入几颗冰块。',tip:'牛奶一定要冰镇，温差越大Dirty效果越好'},{title:'直接萃取',desc:'将浓缩咖啡直接萃取在冰牛奶上，让热咖啡和冰牛奶自然分层。',tip:'这是Dirty最特别的一步——让热咖啡直接滴落在冰牛奶上'},{title:'欣赏纹路',desc:'咖啡会慢慢在牛奶表面形成自然的纹路，宛如水墨画。',tip:'不要搅拌！Dirty的魅力就在于咖啡与牛奶的分层和渐变'},{title:'大口享用',desc:'趁分层最漂亮的时候大口喝，感受冷热交替的口感。',tip:'Dirty不要用吸管，直接对杯喝，每一口的冷热比例都不同'}], tips:['Dirty的灵魂在于温差——极冷的牛奶和极热的浓缩，温差越大分层越美','盛装Dirty适合用透明矮杯，方便欣赏咖啡沉降的美丽过程','建议用深烘焙豆，油脂丰富才能在牛奶表面形成漂亮的纹路'], flavorSummary:'Dirty是一场味觉的戏剧。第一口是冰牛奶的清凉，接着热浓缩咖啡的醇厚汹涌而来，冷热在口中交替碰撞。咖啡油脂在牛奶中慢慢晕染，每一秒都在变化的纹路让人舍不得喝掉。这是一杯好看又好喝的咖啡艺术品。' },
  { id:11, name:'生椰拿铁', enName:'Coconut Latte', category:'网红特调', flavor:'椰香浓郁，清甜顺滑，瑞幸爆款居家复刻', description:'生椰拿铁是近年最火的咖啡特调。椰乳的天然清甜搭配浓缩咖啡的醇厚，一秒穿越到热带海岛。', difficulty:'简单', time:'3分钟', calories:'≈180kcal', scene:'网红复刻 · 夏日必备', tags:['冷','网红'], cupType:'tall', palette:{ bg:'#F0F4EA', bg2:'#E0E8D0', cup:'#FFF', liq:'#F0EDDC', ac:'#90A870', ac2:'#B8D098' }, decor:['coco'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'厚椰乳',amount:'200ml'},{name:'冰块',amount:'8-10颗'}], steps:[{title:'准备冰杯',desc:'在玻璃杯中装满冰块，倒入200ml厚椰乳。',tip:'椰乳要提前摇匀，厚椰乳比普通椰奶口感更浓郁'},{title:'萃取浓缩',desc:'萃取30ml浓郁的浓缩咖啡。',tip:'生椰拿铁适合用中深烘焙的豆子，巧克力和坚果调性与椰子很搭'},{title:'淋入咖啡',desc:'将浓缩咖啡沿杯壁缓慢淋入椰乳中，形成漂亮的分层。',tip:'用勺子垫在咖啡液下可以帮助分层，效果更明显'},{title:'搅拌享用',desc:'喝前搅拌均匀，让椰香与咖啡充分融合。',tip:'先拍照再搅拌，生椰拿铁的分层效果非常出片'}], tips:['推荐使用专业厚椰乳品牌（如菲诺），口感比普通椰奶浓郁3倍','生椰拿铁建议不加糖，椰乳本身的甜度已经足够','可以用椰乳冰块代替普通冰块，防止融化后稀释口感'], flavorSummary:'一口生椰拿铁，仿佛置身热带海岛。椰乳的浓郁奶香与咖啡的醇厚完美交融，清甜而不腻，丝滑入喉。这是瑞幸最成功的爆品，也是居家复刻成功率最高的网红咖啡。' },
  { id:12, name:'燕麦拿铁', enName:'Oat Latte', category:'网红特调', flavor:'谷物香气浓郁，乳糖不耐福音，植物奶咖天花板', description:'燕麦拿铁是植物基咖啡的明星产品。燕麦奶的天然甜感和谷物香气与咖啡是天生一对。', difficulty:'简单', time:'4分钟', calories:'≈160kcal', scene:'健康生活 · 乳糖不耐首选', tags:['热','植物基'], cupType:'hot', palette:{ bg:'#F0ECE4', bg2:'#E4DCC8', cup:'#FFF', liq:'#C8B898', ac:'#B8A070', ac2:'#D4C098' }, decor:['oat'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'燕麦奶',amount:'200ml'},{name:'咖啡豆',amount:'18g'}], steps:[{title:'萃取浓缩',desc:'萃取30ml浓缩咖啡，油脂要丰富。',tip:'燕麦奶和深烘焙豆是绝配，坚果巧克力调性相得益彰'},{title:'加热燕麦奶',desc:'将燕麦奶加热到65°C，可以用蒸汽棒或小锅加热。',tip:'燕麦奶加热不要超过70°C，否则会破坏口感和甜度'},{title:'打发（可选）',desc:'燕麦奶也可以打发成奶泡，虽然不如牛奶绵密但别有风味。',tip:'咖啡师版燕麦奶（如Oatly Barista）专门为打发设计，效果更好'},{title:'融合出品',desc:'将热燕麦奶倒入浓缩咖啡中，轻轻搅拌均匀。',tip:'燕麦拿铁适合用敞口杯，享受燕麦和咖啡混合的香气'}], tips:['推荐Oatly咖啡大师或小麦欧耶，专门为咖啡设计的燕麦奶打发效果更好','燕麦奶自带甜感，不需要额外加糖','冰燕麦拿铁同样好喝：冰块+燕麦奶+浓缩，清爽又饱腹'], flavorSummary:'燕麦拿铁是植物基咖啡的巅峰之作。燕麦奶独特的谷物香气与咖啡完美融合，口感如丝绸般顺滑。令人惊喜的是燕麦奶自带的天然甜感，让这杯咖啡不需要任何添加糖就已经足够甜美。乳糖不耐受者的福音，健康与美味兼得。' },
  { id:13, name:'抹茶拿铁(咖啡版)', enName:'Matcha Coffee Latte', category:'网红特调', flavor:'抹茶清苦与咖啡醇厚，东方与西方的味觉碰撞', description:'抹茶和咖啡的跨界组合，日式抹茶的清雅与意式浓缩的热情在杯中相遇，创造出令人惊喜的味觉体验。', difficulty:'中等', time:'6分钟', calories:'≈190kcal', scene:'创意饮品 · 下午茶新宠', tags:['冷','创意'], cupType:'tall', palette:{ bg:'#EEF4EC', bg2:'#DCE8D4', cup:'#FFF', liq:'#7A9A5A', ac:'#A8C090', ac2:'#C8D8B0' }, decor:['matcha'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'抹茶粉',amount:'4g'},{name:'全脂牛奶',amount:'200ml'},{name:'冰块',amount:'8-10颗'},{name:'糖浆',amount:'10ml（可选）'}], steps:[{title:'调制抹茶液',desc:'将4g抹茶粉过筛，加入少量热水（约80°C）用茶筅搅拌至无颗粒。',tip:'抹茶粉一定要过筛，否则容易结块。用茶筅画"M"字搅拌最均匀'},{title:'准备牛奶',desc:'在杯中加入冰块，倒入200ml牛奶。',tip:'建议用全脂牛奶，口感更醇厚，与抹茶更搭'},{title:'萃取浓缩',desc:'萃取30ml浓缩咖啡备用。',tip:'选择中浅烘焙的豆子，果酸调性更能与抹茶的清苦呼应'},{title:'组装',desc:'将抹茶液倒入牛奶中，再缓缓倒入浓缩咖啡，形成三层渐变。',tip:'顺序是：牛奶→抹茶液→咖啡，从重到轻，分层效果最好'}], tips:['选用日本宇治抹茶粉，颜色翠绿、口感清甜无涩味','抹茶和咖啡的比例可以根据个人口味调整，初次尝试建议抹茶少一些','热版抹茶咖啡拿铁也同样美味：抹茶液+热牛奶+浓缩'], flavorSummary:'东方与西方的味觉对话。第一眼是抹茶的翠绿与咖啡的深褐形成的美丽渐层，入口是抹茶独特的清苦，随后咖啡的醇厚在口腔中弥漫。两种截然不同的风味在舌尖交织，既有抹茶的清雅，又有咖啡的热情。' },
  { id:14, name:'香草拿铁', enName:'Vanilla Latte', category:'网红特调', flavor:'香草芬芳，温润甜蜜，最受欢迎的调味拿铁', description:'香草的甜美芬芳与拿铁的丝滑奶香完美结合，是咖啡店最受欢迎的调味拿铁之一。', difficulty:'简单', time:'5分钟', calories:'≈200kcal', scene:'日常治愈 · 女生最爱', tags:['热','甜'], cupType:'hot', palette:{ bg:'#F8F0E8', bg2:'#EDE4D8', cup:'#FFF', liq:'#C4A882', ac:'#DEC48C', ac2:'#EDE0C0' }, decor:['vanilla'], ingredients:[{name:'浓缩咖啡',amount:'30ml'},{name:'全脂牛奶',amount:'200ml'},{name:'香草糖浆',amount:'15ml'},{name:'香草荚',amount:'半根（可选）'}], steps:[{title:'制作香草牛奶',desc:'将半根香草荚剖开，刮出香草籽加入牛奶中，小火加热。',tip:'用真正的香草荚比香草精风味自然浓郁百倍'},{title:'萃取浓缩',desc:'萃取30ml浓缩咖啡。',tip:'香草风味偏甜，建议用中深烘焙的咖啡豆平衡甜度'},{title:'杯底加糖浆',desc:'在杯底加入15ml香草糖浆。',tip:'自制香草糖浆：香草荚+水+糖熬煮即可'},{title:'组合出品',desc:'先将香草牛奶倒入杯中，再淋入浓缩咖啡，最后舀上奶泡。',tip:'用香草荚点缀在杯边，增添高级感'}], tips:['自制香草精：香草荚浸泡在伏特加中密封保存2周即可使用','香草拿铁适合搭配甜点，特别是巧克力类甜品','冰香草拿铁同样美味，冰块+香草糖浆+牛奶+浓缩，清爽甜蜜'], flavorSummary:'香草拿铁是最温柔的咖啡选择。香草那标志性的甜美芬芳与拿铁的丝滑奶香融为一体，每一口都带着香草的独特香气。这杯咖啡就像被施了魔法，让人喝了一口就忍不住嘴角上扬。心情不好的时候，一杯香草拿铁就是最好的治愈。' },

    mason: (p) => `<path d="M160 200L155 425C155 432 162 438 175 438L225 438C238 438 245 432 245 425L240 200" fill="${p.cup}" stroke="${S}" stroke-width="${SW}"/><rect x="155" y="195" width="90" height="14" rx="4" fill="${p.cup}" stroke="${S}" stroke-width="${SW}"/><path d="M157 215L153 420C153 428 160 433 175 433L225 433C240 433 247 428 247 420L243 215Z" fill="${p.liq}" opacity="0.85"/>`,
    bottle: (p) => `<path d="M165 175L165 200C165 205 168 210 175 212L175 420C175 430 182 435 195 435L205 435C218 435 225 430 225 420L225 212C232 210 235 205 235 200L235 175" fill="${p.cup}" stroke="${S}" stroke-width="${SW}"/><ellipse cx="200" cy="175" rx="35" ry="8" fill="${p.cup}" stroke="${S}" stroke-width="${SW}"/><path d="M167 185L167 418C167 425 172 430 195 430L205 430C228 430 233 425 233 418L233 185Z" fill="${p.liq}" opacity="0.8"/>`,
  };
  return {
    render: function(coffee) {
      if (!coffee) return '';

        return `<img src="${coffee.customImage}" alt="${coffee.name}" style="width:100%;height:auto;display:block;object-fit:cover;">`;

      const p = coffee.palette;

    }
  };
})();

// HELPERS

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let toastTimer;

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function saveToLS() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(coffeeData));
    $('#saveStatus').textContent = '已保存 ' + new Date().toLocaleTimeString();
  } catch(e) { showToast('保存失败: ' + e.message); }
}

function loadFromLS() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

let nextId = 21;

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderSidebar() {
  const list = $('#coffeeList');
  list.innerHTML = coffeeData.map(c => `
    <div class="coffee-item ${c.id === currentId ? 'active' : ''}" data-id="${c.id}">
      <div class="badge" style="background:${c.palette.bg};color:${c.palette.liq};overflow:hidden;font-size:0;">
        ${c.customImage
          ? `<img src="${c.customImage}" alt="" style="width:100%;height:100%;object-fit:cover;">`
          : c.name[0]
        }
      </div>
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="sub">${c.enName} · ${c.category}${c.customImage ? ' 📷' : ''}</div>
      </div>
      <button class="del-btn" data-id="${c.id}" title="删除">✕</button>
    </div>
  `).join('');
  $('#coffeeCount').textContent = coffeeData.length;

  // Click to edit
  list.querySelectorAll('.coffee-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.del-btn')) return;
      selectCoffee(parseInt(el.dataset.id));
    });
  });

  // Delete
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      if (confirm(`确定删除「${coffeeData.find(c=>c.id===id)?.name}」？`)) {
        coffeeData = coffeeData.filter(c => c.id !== id);
        if (currentId === id) currentId = null;
        renderSidebar();
        renderEditor();
        renderPreview();
        saveToLS();
        showToast('已删除');
      }
    });
  });
}

// ============================================================
// SELECT COFFEE
// ============================================================
function selectCoffee(id) {
  currentId = id;
  renderSidebar();
  renderEditor();
  renderPreview();
}

// ============================================================
// RENDER EDITOR
// ============================================================
function renderEditor() {
  const area = $('#editorArea');
  const title = $('#editorTitle');
  const idSpan = $('#editorId');

  if (!currentId) {
    area.innerHTML = `<div class="empty-hint"><div class="icon">☕</div><p>左侧列表选择咖啡，或点击「新增咖啡」</p></div>`;
    title.textContent = '选择一杯咖啡开始编辑';
    idSpan.textContent = '';
    return;
  }

  const coffee = coffeeData.find(c => c.id === currentId);
  if (!coffee) { currentId = null; renderEditor(); return; }

  title.textContent = coffee.name;
  idSpan.textContent = `#${coffee.id}`;

  // Tags editor
  const tagsHtml = coffee.tags.map(t =>
    `<span class="tag-item">${t} <span class="x" data-tag="${t}">×</span></span>`
  ).join('');

  // Ingredients
  const ingHtml = coffee.ingredients.map((i, idx) =>
    `<div class="dyn-item">
      <input type="text" class="ing-name" value="${escHtml(i.name)}" placeholder="名称" data-idx="${idx}">
      <input type="text" class="ing-amount" value="${escHtml(i.amount)}" placeholder="用量" data-idx="${idx}">
      <button class="rm-btn" data-ing-idx="${idx}">✕</button>
    </div>`

  // Steps

function escHtml(s) {
  if (typeof s !== 'string') return s || '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
// FORM EVENTS
// ============================================================
function bindFormEvents(coffee) {
  // Tag add
  const tagInput = $('#tagInput');
  const addTag = () => {
    const v = tagInput.value.trim();
    if (v && !coffee.tags.includes(v)) {
      coffee.tags.push(v);
      renderEditor();
    }
    tagInput.value = '';
  };
  tagInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTag(); } });
  $('#addTagBtn').addEventListener('click', addTag);

  // Tag remove
  $$('.tag-item .x').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.tag;
      coffee.tags = coffee.tags.filter(x => x !== t);
      renderEditor();
    });
  });

  // Ingredient
  const ingList = $('#ingList');
  $('#addIngBtn').addEventListener('click', () => {
    coffee.ingredients.push({ name: '', amount: '' });
    renderEditor();
  });
  ingList?.querySelectorAll('.rm-btn[data-ing-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      coffee.ingredients.splice(parseInt(btn.dataset.ingIdx), 1);
      renderEditor();
    });
  });

  // Step
  $('#addStepBtn').addEventListener('click', () => {
    coffee.steps.push({ title: '', desc: '', tip: '' });
    renderEditor();
  });
  $('#stepList')?.querySelectorAll('.rm-btn[data-step-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      coffee.steps.splice(parseInt(btn.dataset.stepIdx), 1);
      renderEditor();
    });
  });

  // Tip
  $('#addTipBtn').addEventListener('click', () => {
    if (!Array.isArray(coffee.tips)) coffee.tips = [];
    coffee.tips.push('');
    renderEditor();
  });
  $('#tipList')?.querySelectorAll('.rm-btn[data-tip-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      coffee.tips.splice(parseInt(btn.dataset.tipIdx), 1);
      renderEditor();
    });
  });

  // Auto-save on input change
  const form = $('#editorForm');
  if (form) {
    form.addEventListener('input', () => { collectFormData(coffee); saveToLS(); renderPreview(); });
    form.addEventListener('change', () => { collectFormData(coffee); saveToLS(); renderPreview(); });
  }

  // Image upload
  const fileInput = $('#imageUpload');
  const previewContainer = $('#imagePreviewContainer');
  if (fileInput) {
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        showToast('图片不能超过 10MB');
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Compress if too large (> 500KB as base64)
        compressImage(ev.target.result, 1200, 0.8, (compressed) => {
          coffee.customImage = compressed;
          saveToLS();
          updateImagePreview(coffee);
          renderPreview();
          showToast('✅ 图片已上传');
        });
      };
      reader.readAsDataURL(file);
    });
  }

  // Initial image preview
  updateImagePreview(coffee);
}

function compressImage(dataUrl, maxW, quality, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxW) { h = h * maxW / w; w = maxW; }
    if (h > maxW) { w = w * maxW / h; h = maxW; }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function updateImagePreview(coffee) {
  const container = $('#imagePreviewContainer');
  if (!container) return;
  if (coffee.customImage) {
    container.innerHTML = `
      <div class="image-preview-wrap">
        <img src="${coffee.customImage}" alt="自定义配图">
        <button class="remove-img-btn" id="removeImgBtn" title="移除图片">✕</button>
      </div>`;
    const rmBtn = document.getElementById('removeImgBtn');
    if (rmBtn) rmBtn.addEventListener('click', () => {
      delete coffee.customImage;
      saveToLS();
      updateImagePreview(coffee);
      renderPreview();
      showToast('已移除自定义图片');
    });
  } else {
    container.innerHTML = '';
  }
}

function collectFormData(coffee) {
  const g = id => document.getElementById(id);
  coffee.name = g('f_name')?.value || coffee.name;
  coffee.enName = g('f_enName')?.value || coffee.enName;
  coffee.category = g('f_category')?.value || coffee.category;
  coffee.flavor = g('f_flavor')?.value || coffee.flavor;
  coffee.description = g('f_description')?.value || coffee.description;
  coffee.difficulty = g('f_difficulty')?.value || coffee.difficulty;
  coffee.time = g('f_time')?.value || coffee.time;
  coffee.calories = g('f_calories')?.value || coffee.calories;
  coffee.scene = g('f_scene')?.value || coffee.scene;
  coffee.cupType = g('f_cupType')?.value || coffee.cupType;
  const decorVal = g('f_decor')?.value;
  coffee.decor = decorVal && decorVal !== 'none' ? [decorVal] : [];

  if (!coffee.palette) coffee.palette = {};
  coffee.palette.bg = g('f_bg')?.value || coffee.palette.bg;
  coffee.palette.bg2 = g('f_bg2')?.value || coffee.palette.bg2;
  coffee.palette.cup = g('f_cup')?.value || coffee.palette.cup;
  coffee.palette.liq = g('f_liq')?.value || coffee.palette.liq;
  coffee.palette.ac = g('f_liq')?.value || '#C4A882';
  coffee.palette.ac2 = g('f_bg2')?.value || '#D4B898';
  coffee.flavorSummary = g('f_flavorSummary')?.value || coffee.flavorSummary;

  // Collect ingredients
  const ingNames = $$('.ing-name');
  const ingAmounts = $$('.ing-amount');
  coffee.ingredients = Array.from(ingNames).map((el, i) => ({
    name: el.value,
    amount: ingAmounts[i]?.value || ''
  }));

  // Collect steps
  const stepTitles = $$('.step-title');
  const stepDescs = $$('.step-desc');
  const stepTips = $$('.step-tip');
  coffee.steps = Array.from(stepTitles).map((el, i) => ({
    title: el.value,
    desc: stepDescs[i]?.value || '',
    tip: stepTips[i]?.value || ''
  }));

  // Collect tips
  const tipTexts = $$('.tip-text');
  coffee.tips = Array.from(tipTexts).map(el => el.value);

  // Update sidebar
  renderSidebar();

  // Update title
  const title = $('#editorTitle');
  const idSpan = $('#editorId');
  if (title) title.textContent = coffee.name;
  if (idSpan) idSpan.textContent = `#${coffee.id}`;
}

// ============================================================
// EXPORT as JS
// ============================================================
function exportData() {
  // Collect current form data first
  if (currentId) {
    const coffee = coffeeData.find(c => c.id === currentId);
    if (coffee) collectFormData(coffee);
  }
  saveToLS();

  const jsContent = `// Coffee Studio 数据 — 导出时间 ${new Date().toLocaleString()}
// 替换 coffee-app.html 中 coffeeData 数组即可更新
const coffeeData = ${JSON.stringify(coffeeData, null, 2)};
`;
  const blob = new Blob([jsContent], { type: 'text/javascript' });

  a.href = url;
  a.download = 'coffee-data.js';
  a.click();

// ============================================================
// GENERATE FULL APP — 自动生成完整的主应用 HTML
// ============================================================
function generateApp() {
  // Collect current form data first
  if (currentId) {
    const coffee = coffeeData.find(c => c.id === currentId);
    if (coffee) collectFormData(coffee);
  }
  saveToLS();

  showToast('请选择您的 coffee-app.html 文件');
  // Use a temporary file input
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.html';
  input.style.display = 'none';
  document.body.appendChild(input);
  input.click();

  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) { input.remove(); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        let html = ev.target.result;
        const dataStr = JSON.stringify(coffeeData, null, 2);
        // Replace coffeeData array — supports both const and let
        const pattern = /(const|let)\s+coffeeData\s*=\s*\[[\s\S]*?\];/;
        const replacement = `let coffeeData = ${dataStr};`;

        if (pattern.test(html)) {
          html = html.replace(pattern, replacement);
          const blob = new Blob([html], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'coffee-app.html';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('✅ 已生成！请用下载的 coffee-app.html 替换原文件');
        } else {
          showToast('❌ 无法识别文件格式，请选择正确的 coffee-app.html');
        }
      } catch(err) {
        showToast('生成失败: ' + err.message);
      }
    };
    reader.readAsText(file);
    input.remove();
  });
}

// ============================================================
// IMPORT
// ============================================================
function importData() {
  const input = $('#fileInput');
  input.click();
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        // Try to extract JSON from JS or parse directly
        let data;
        if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
          data = JSON.parse(text);
        } else {
          const match = text.match(/const\s+coffeeData\s*=\s*(\[[\s\S]*?\]);/);
          if (match) {
            data = JSON.parse(match[1]);
          } else {
            throw new Error('无法解析文件');
          }
        }
        if (Array.isArray(data) && data.length > 0) {
          coffeeData = data;
          currentId = null;
          renderSidebar();
          renderEditor();
          renderPreview();
          saveToLS();
          showToast(`✅ 已导入 ${data.length} 款咖啡`);
        } else {
          showToast('数据格式不正确');
        }
      } catch(err) {
        showToast('导入失败: ' + err.message);
      }
    };
    reader.readAsText(file);
    input.value = '';
  };
}

  const saved = loadFromLS();
  coffeeData = saved || JSON.parse(JSON.stringify(DEFAULT_DATA));
  nextId = Math.max(...coffeeData.map(c => c.id), 20) + 1;

  renderSidebar();
  renderEditor();
  renderPreview();

  // Buttons
  $('#addBtn').addEventListener('click', addNewCoffee);
  $('#saveBtn').addEventListener('click', saveAll);
  $('#exportBtn').addEventListener('click', exportData);
  $('#exportDataBtn').addEventListener('click', exportData);
  $('#importBtn').addEventListener('click', importData);
  $('#generateAppBtn').addEventListener('click', generateApp);
}

document.addEventListener('DOMContentLoaded', init);
